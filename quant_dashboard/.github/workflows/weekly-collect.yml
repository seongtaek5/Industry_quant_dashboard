name: Weekly Quant Data Collection

on:
  workflow_dispatch:
  schedule:
    # 월요일 07:00 KST = 일요일 22:00 UTC
    - cron: "0 22 * * 0"

permissions:
  contents: write

jobs:
  collect-and-commit:
    runs-on: ubuntu-latest
    env:
      ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collectors now
        run: python scheduler.py --run-now

      - name: Commit updated parquet files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.parquet logs/collector.log || true
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: weekly market data update"
            git push
          fi
