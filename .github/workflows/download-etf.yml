name: Daily ETF Price Update

on:
  schedule:
    # 매일 한국시간 오전 6시 실행 (UTC 21:00 = 전날 21:00)
    - cron: '0 21 * * *'  # UTC 21:00 (한국시간 오전 6시)
  
  # 수동 트리거 옵션
  workflow_dispatch:

jobs:
  download-etf-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas
      
      - name: Download latest ETF data
        run: |
          python download_sector_etf.py
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/sector_etf_prices.csv; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/sector_etf_prices.csv
          git commit -m "✅ Update sector ETF prices - $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push
